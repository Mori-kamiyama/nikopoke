id: curse
name: のろい
type: ghost
category: status
pp: 10
steps:
- type: conditional
  if:
    type: user_has_status
    statusId: ghost
  then:
  - type: damage_ratio
    ratioMaxHp: 0.5
    target: self
  - type: apply_status
    statusId: curse
    target: target
    data:
      damageRatio: 0.25
  else:
  - type: modify_stage
    target: self
    stages:
      atk: 1
      def: 1
      spe: -1
