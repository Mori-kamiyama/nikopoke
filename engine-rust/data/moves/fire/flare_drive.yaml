id: flare_drive
name: フレアドライブ
type: fire
category: physical
pp: 15
steps:
- type: damage
  power: 120
  accuracy: 1
- type: damage_ratio
  ratioMaxHp: 0.33
  target: self
- type: chance
  p: 0.1
  then:
  - type: apply_status
    statusId: burn
    target: target
- type: conditional
  if:
    type: user_has_status
    statusId: freeze
  then:
  - type: remove_status
    statusId: freeze
    target: self
